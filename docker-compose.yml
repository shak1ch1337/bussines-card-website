version: '3.8'

services:
  backend:
    build: ./backend
    container_name: laravel_app
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:80"
  frontend:
    build: ./frontend
    container_name: vue_app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
  db:
    image: mariadb:10.11
    ports:
      - "3306:3306"
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: notSecureChangeMe
    volumes:
      - mariadbdata:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_ARBITRARY=1

volumes:
  frontend: null
  app: null
  mariadbdata: null